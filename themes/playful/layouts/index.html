{{ define "main" }}
<div class="home-hero">
    <h1>{{ .Title }}</h1>
    <p>{{ .Description | default .Site.Params.description }}</p>
    <div class="download-section">
        <a href="https://github.com/kitswas/VirtualGamePad-Mobile/releases" class="download-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Android App
        </a>
        <a href="https://github.com/kitswas/VirtualGamePad-PC/releases" class="download-button" style="background: #ec4899;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            PC Server
        </a>
    </div>
</div>

<article class="page">
    {{ if .Params.toc }}
    <div class="toc toc-inline">
        <h2>{{ i18n "toc_title" }}</h2>
        {{ .TableOfContents }}
    </div>
    {{ end }}
    <div class="page-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
