{{ define "main" }}
<div class="home-hero">
    <h1>{{ .Title }}</h1>
    <p>{{ .Description | default .Site.Params.description }}</p>
    <div class="download-section">
        <a href="https://github.com/kitswas/VirtualGamePad-Mobile/releases" class="download-button">GET CLIENT</a>
        <a href="https://github.com/kitswas/VirtualGamePad-PC/releases" class="download-button">GET SERVER</a>
    </div>
</div>
<article class="page">
    <div class="page-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
