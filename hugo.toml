languageCode = "en-in"
title = "VirtualGamePad"
theme = "vgp-theme"

[params]
logo = "assets/SquareIcon.png"
description = "Virtual Gamepad for Android and PC"
accent_image = "assets/GamepadIcon.png"
accent_color = "#157878"
open_graph_image = "assets/open-graph-image.png"

[markup]
[markup.goldmark]
[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
strikethrough = true
table = true
taskList = true
typographer = true
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [["$$", "$$"], ["\\[", "\\]"]]
inline = [["$", "$"], ["\\(", "\\)"]]
[markup.goldmark.renderer]
unsafe = true

[languages]
[languages.en]
languageName = "English"
weight = 1

